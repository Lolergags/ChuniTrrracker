name: Weekly API Monitor

on:
  schedule:
    - cron: '0 0 * * 0' # Run every Sunday at midnight
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install tsx
        run: npm install -g tsx
        
      - name: Run API Monitor Script
        run: tsx scripts/monitor-apis.ts
        
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Upstream API Format Changed (Ghost Charts Alert)',
              body: 'The scheduled API monitor detected a breaking change in the Beerpsi song list or Kamaitachi data structure. Song IDs for ghost charts may have shifted. Please review `scripts/monitor-apis.ts` and the latest external API responses.',
              labels: ['bug', 'automated issue']
            })
